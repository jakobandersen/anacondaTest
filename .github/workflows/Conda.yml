name: Build Conda packages

on:
  push:
    branches:
    - develop
    - main
    tags:
    - "v*"

concurrency:
  group: ci-${{ github.ref }}-conda

jobs:
  Conda-Linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: 'recursive'
    - name: Set PATH
      run: echo "${HOME}/.local/bin" >> $GITHUB_PATH
    - name: Update apt
      run: sudo apt update
    - name: Install pip dependencies
      run: |
        sudo apt install python3-pip
    - name: Build
      run: ./scripts/makeConda.sh
    - name: Archive result
      uses: actions/upload-artifact@v4
      with:
        name: conda-linux
        path: |
          conda/conda-bld
        retention-days: 7
  Conda-Linux-upload:
    needs: Conda-Linux
    runs-on: ubuntu-22.04
    if: github.repository_owner == 'jakobandersen'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: 'recursive'
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: conda-linux
        path: ./dist
    - name: Upload to anaconda.org
      uses: anaconda/actions/upload-package@v0
      with:
        token: ${{ secrets.ANACONDA_ORG_TOKEN }}
        channel: jakobandersen
        packages: ./dist/linux-64/*.conda
